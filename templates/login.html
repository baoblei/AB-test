<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户认证 - AB Test平台</title>
    <style>
        :root { --primary: #2196F3; --error: #f44336; --success: #4CAF50; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            max-width: 90vw;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 1.5rem;
        }
        .auth-header p {
            color: #666;
            font-size: 0.9rem;
            margin: 0;
        }
        .tab-switch {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #666;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        .submit-btn:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: none;
        }
        .message.error {
            background: #ffebee;
            color: var(--error);
            border: 1px solid #ffcdd2;
        }
        .message.success {
            background: #e8f5e9;
            color: var(--success);
            border: 1px solid #c8e6c9;
        }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
        .nav-link {
            text-align: center;
            margin-top: 20px;
        }
        .nav-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .nav-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h1>AB Test 评测平台</h1>
        <p>用户认证中心</p>
    </div>

    <div id="message" class="message"></div>

    <div class="tab-switch">
        <button class="tab-btn active" onclick="switchTab('login')">登录</button>
        <button class="tab-btn" onclick="switchTab('register')">注册</button>
    </div>

    <!-- 登录表单 -->
    <div id="login-panel" class="form-panel active">
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="login-username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="login-password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="submit-btn" id="login-btn">登录</button>
        </form>
        <div class="nav-link">
            <a href="/">返回首页</a>
        </div>
    </div>

    <!-- 注册表单 -->
    <div id="register-panel" class="form-panel">
        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="reg-username" placeholder="请输入用户名" required minlength="3">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="reg-password" placeholder="请输入密码 (至少6位)" required minlength="6">
            </div>
            <div class="form-group">
                <label>邮箱 (可选)</label>
                <input type="email" id="reg-email" placeholder="请输入邮箱">
            </div>
            <button type="submit" class="submit-btn" id="reg-btn">注册</button>
        </form>
        <div class="nav-link">
            <a href="/">返回首页</a>
        </div>
    </div>
</div>

<script>
    // 检查是否已登录
    async function checkAuth() {
        try {
            const res = await fetch('/api/auth/me');
            if (res.ok) {
                // 已登录，跳转到评测页
                window.location.href = '/';
            }
        } catch (e) {}
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(panel => panel.classList.remove('active'));

        document.querySelector(`.tab-btn:nth-child(${tab === 'login' ? 1 : 2})`).classList.add('active');
        document.getElementById(`${tab}-panel`).classList.add('active');
        hideMessage();
    }

    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
        msg.style.display = 'block';
    }

    function hideMessage() {
        document.getElementById('message').style.display = 'none';
    }

    async function handleLogin(e) {
        e.preventDefault();
        hideMessage();

        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.textContent = '登录中...';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('login-username').value,
                    password: document.getElementById('login-password').value
                })
            });

            const data = await res.json();

            if (res.ok) {
                showMessage('登录成功，正在跳转...', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
            } else {
                showMessage(data.detail || '登录失败', 'error');
            }
        } catch (e) {
            showMessage('网络错误，请稍后重试', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '登录';
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        hideMessage();

        const btn = document.getElementById('reg-btn');
        btn.disabled = true;
        btn.textContent = '注册中...';

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('reg-username').value,
                    password: document.getElementById('reg-password').value,
                    email: document.getElementById('reg-email').value || null
                })
            });

            const data = await res.json();

            if (res.ok) {
                showMessage('注册成功！请登录', 'success');
                setTimeout(() => switchTab('login'), 1500);
            } else {
                showMessage(data.detail || '注册失败', 'error');
            }
        } catch (e) {
            showMessage('网络错误，请稍后重试', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '注册';
        }
    }

    // 初始化
    checkAuth();
</script>
</body>
</html>
